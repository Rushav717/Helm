apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  labels:
    app: nginx
    tier: frontend
    purpose: deployment
spec: #replica set
  replicas: {{ .Values.deployment.replicas }} #lets say this will change frequently
  selector:
    matchLabels:
      app: nginx
      tier: frontend
      purpose: deployment
  template:  #pod template
    metadata:
      labels:
        app: nginx
        tier: frontend
        purpose: deployment
    spec:
      containers:
      - name: nginx
        image: nginx:{{ .Values.deployment.imageversion }}  #version will change frequently
        ports:
        - containerPort: 80